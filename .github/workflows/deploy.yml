name: deploy

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month at midnight UTC

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: echo "services=$(cat .github/workflows/deploy.json)" >> $GITHUB_OUTPUT
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push using Podman
        run: |
          ACTOR=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          SHA=${{ github.sha }}
          podman build \
            --build-arg REPO_URL="${{ github.server_url }}/${{ github.repository }}" \
            -t ghcr.io/$ACTOR/${{ matrix.service }}:$SHA \
            -t ghcr.io/$ACTOR/${{ matrix.service }}:latest \
            ${{ matrix.service }} --file Containerfile
          podman push ghcr.io/$ACTOR/${{ matrix.service }}:$SHA
          podman push ghcr.io/$ACTOR/${{ matrix.service }}:latest
